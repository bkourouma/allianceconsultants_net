name: CI/CD Alliance Consultants

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  APP_NAME: allianceconsultants-net
  APP_DOMAIN: allianceconsultants.net
  DEPLOY_PATH: /home/deployer/apps/allianceconsultants-net
  APP_IMAGE: ghcr.io/bkourouma/allianceconsultants-net

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push App
        run: |
          docker build \
            -f infra/Dockerfile \
            --build-arg NEXT_PUBLIC_SITE_URL=https://allianceconsultants.net \
            --build-arg NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=${{ secrets.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }} \
            --build-arg NEXT_PUBLIC_BING_SITE_VERIFICATION=${{ secrets.NEXT_PUBLIC_BING_SITE_VERIFICATION }} \
            --build-arg NEXT_PUBLIC_MATOMO_URL=${{ secrets.NEXT_PUBLIC_MATOMO_URL }} \
            --build-arg NEXT_PUBLIC_MATOMO_SITE_ID=${{ secrets.NEXT_PUBLIC_MATOMO_SITE_ID }} \
            -t ${{ env.APP_IMAGE }}:latest \
            -t ${{ env.APP_IMAGE }}:${{ github.sha }} \
            .
          docker push ${{ env.APP_IMAGE }}:latest
          docker push ${{ env.APP_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: [self-hosted, linux, x64, allianceconsultants-net]
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on self-hosted runner
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="${{ env.DEPLOY_PATH }}"
          mkdir -p "$APP_DIR/docker/nginx"
          cp docker-compose.prod.yml "$APP_DIR/docker-compose.prod.yml"
          cp docker/nginx/nginx.conf "$APP_DIR/docker/nginx/nginx.conf"
          cd "$APP_DIR"
          docker pull "${{ env.APP_IMAGE }}:latest"
          dc() {
            docker compose --env-file .env.production -f docker-compose.prod.yml "$@"
          }
          dc down 2>/dev/null || true
          dc up -d
          # Shared reverse proxy network on this VPS
          docker network connect app_medicpro-network allianceconsultants-nginx 2>/dev/null || true
          echo "Waiting for services to start..."
          sleep 15
          # Sync Prisma schema against the running DB (no migrations dir is committed).
          # Pin prisma CLI to match @prisma/client@5.22.0 — `npx prisma` resolves to v7+.
          docker exec allianceconsultants-web npx -y prisma@5.22.0 db push --skip-generate --accept-data-loss || true
          dc ps
          echo "--- Web logs (last 30 lines) ---"
          docker logs --tail 30 allianceconsultants-web 2>&1 || true
          docker image prune -f
